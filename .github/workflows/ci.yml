name: CI/CD Frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Use Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Instalar dependencias
        working-directory: ./comve-app-frontend
        run: npm ci

      - name: Compilar proyecto Expo
        working-directory: ./comve-app-frontend
        run: npx expo export --platform web
